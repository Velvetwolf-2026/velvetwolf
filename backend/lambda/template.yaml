AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: VelvetWolf backend migration stack for running auth APIs on AWS Lambda.

Globals:
  Function:
    Runtime: nodejs24.x
    Timeout: 30
    MemorySize: 512

Resources:
  VelvetwolfHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - https://develop.d2xmob7nneg6g3.amplifyapp.com
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - OPTIONS
          - PUT
        MaxAge: 600

  VelvetwolfBackendFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: index.handler
      Events:
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref VelvetwolfHttpApi
            Path: /
            Method: GET
        GoogleAuth:
          Type: HttpApi
          Properties:
            ApiId: !Ref VelvetwolfHttpApi
            Path: /auth/google
            Method: GET
        GoogleCallback:
          Type: HttpApi
          Properties:
            ApiId: !Ref VelvetwolfHttpApi
            Path: /auth/google/callback
            Method: GET
        Profile:
          Type: HttpApi
          Properties:
            ApiId: !Ref VelvetwolfHttpApi
            Path: /profile
            Method: GET
        Wishlist:
          Type: HttpApi
          Properties:
            ApiId: !Ref VelvetwolfHttpApi
            Path: /wishlist
            Method: GET
        WishlistToggle:
          Type: HttpApi
          Properties:
            ApiId: !Ref VelvetwolfHttpApi
            Path: /wishlist/toggle
            Method: POST
        Cart:
          Type: HttpApi
          Properties:
            ApiId: !Ref VelvetwolfHttpApi
            Path: /cart
            Method: GET
        CartAdd:
          Type: HttpApi
          Properties:
            ApiId: !Ref VelvetwolfHttpApi
            Path: /cart/add
            Method: POST
        CartUpdate:
          Type: HttpApi
          Properties:
            ApiId: !Ref VelvetwolfHttpApi
            Path: /cart/update
            Method: POST
        CartRemove:
          Type: HttpApi
          Properties:
            ApiId: !Ref VelvetwolfHttpApi
            Path: /cart/remove
            Method: POST
        Signup:
          Type: HttpApi
          Properties:
            ApiId: !Ref VelvetwolfHttpApi
            Path: /auth/signup
            Method: POST
        Login:
          Type: HttpApi
          Properties:
            ApiId: !Ref VelvetwolfHttpApi
            Path: /auth/login
            Method: POST
        ResendOtp:
          Type: HttpApi
          Properties:
            ApiId: !Ref VelvetwolfHttpApi
            Path: /auth/resend-otp
            Method: POST
        ForgotPassword:
          Type: HttpApi
          Properties:
            ApiId: !Ref VelvetwolfHttpApi
            Path: /auth/forgot-password
            Method: POST
        VerifyOtp:
          Type: HttpApi
          Properties:
            ApiId: !Ref VelvetwolfHttpApi
            Path: /auth/verify-otp
            Method: POST
